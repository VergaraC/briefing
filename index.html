<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Briefing</title>
<meta name="theme-color" media="(prefers-color-scheme: light)" content="#f6f7f9">
<meta name="theme-color" media="(prefers-color-scheme: dark)" content="#111318">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Briefing">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="icon-180.png">
<style>
  :root {
    --bg: #f6f7f9;
    --card: #ffffff;
    --text: #16181d;
    --muted: #6b7280;
    --border: #e5e7eb;
    --accent: #2563eb;
    --chip-bg: #ffffff;
    --chip-active: #16181d;
    --chip-active-text: #ffffff;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #111318;
      --card: #1a1d24;
      --text: #e8eaed;
      --muted: #9aa0a6;
      --border: #2a2e37;
      --accent: #60a5fa;
      --chip-bg: #1a1d24;
      --chip-active: #e8eaed;
      --chip-active-text: #111318;
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    padding-bottom: env(safe-area-inset-bottom);
    -webkit-tap-highlight-color: transparent;
  }
  header {
    position: sticky;
    top: 0;
    z-index: 10;
    background: var(--bg);
    padding: calc(12px + env(safe-area-inset-top)) 16px 0;
  }
  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
  }
  h1 { font-size: 22px; font-weight: 800; letter-spacing: -0.5px; }
  .meta-line { font-size: 12px; color: var(--muted); }
  .controls { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
  #bell.on { color: #f59e0b; border-color: #f59e0b; }
  #refresh, #searchBtn, #bell {
    border: 1px solid var(--border);
    background: var(--card);
    color: var(--text);
    border-radius: 50%;
    width: 38px;
    height: 38px;
    font-size: 17px;
    cursor: pointer;
    flex-shrink: 0;
  }
  .sort {
    display: flex;
    border: 1px solid var(--border);
    background: var(--card);
    border-radius: 999px;
    overflow: hidden;
  }
  .sort button {
    border: 0;
    background: transparent;
    color: var(--muted);
    font-size: 13px;
    font-weight: 600;
    padding: 8px 13px;
    cursor: pointer;
  }
  .sort button.active {
    background: var(--chip-active);
    color: var(--chip-active-text);
  }
  .hot { color: #f59e0b; font-weight: 700; border: 0; background: transparent; font-size: 12px; padding: 0; cursor: pointer; font-family: inherit; }
  .cov-row { display: block; text-decoration: none; color: inherit; padding: 11px 0; border-bottom: 1px solid var(--border); }
  .cov-row .src { display: flex; align-items: center; gap: 6px; font-size: 12px; font-weight: 700; margin-bottom: 4px; }
  .cov-row h4 { font-size: 14px; font-weight: 600; line-height: 1.35; }
  .cov-spread { font-size: 12px; color: var(--muted); margin-bottom: 8px; text-transform: capitalize; }
  #sheet.coverage { max-height: 70vh; overflow-y: auto; }
  .item.read { opacity: 0.55; }
  .mainlink { display: block; text-decoration: none; color: inherit; }
  .share {
    margin-left: auto;
    border: 0;
    background: transparent;
    color: var(--muted);
    font-size: 16px;
    padding: 2px 10px;
    cursor: pointer;
  }
  #search {
    display: none;
    width: 100%;
    margin: 0 0 12px;
    padding: 10px 14px;
    border-radius: 12px;
    border: 1px solid var(--border);
    background: var(--card);
    color: var(--text);
    font-size: 16px; /* >=16px or iOS force-zooms the page on focus */
    -webkit-appearance: none;
  }
  header.searching #search { display: block; }
  .expand {
    margin-left: 0;
    border: 0;
    background: transparent;
    color: var(--muted);
    font-size: 16px;
    padding: 2px 10px;
    cursor: pointer;
    transition: transform 0.15s;
  }
  .item.open .expand { transform: rotate(180deg); }
  .desc {
    display: none;
    margin-top: 8px;
    font-size: 13.5px;
    line-height: 1.45;
    color: var(--muted);
  }
  .item.open .desc { display: block; }
  .alts { margin-top: 8px; font-size: 12px; color: var(--muted); }
  .alts a { color: var(--accent); text-decoration: none; font-weight: 600; }
  .divider {
    display: flex;
    align-items: center;
    gap: 10px;
    color: var(--muted);
    font-size: 12px;
    margin: 14px 0;
  }
  .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
  #refresh.spinning { animation: spin 0.9s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  nav {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    padding: 4px 0 12px;
    scrollbar-width: none;
  }
  nav::-webkit-scrollbar { display: none; }
  .chip {
    border: 1px solid var(--border);
    background: var(--chip-bg);
    color: var(--text);
    border-radius: 999px;
    padding: 7px 14px;
    font-size: 14px;
    font-weight: 600;
    white-space: nowrap;
    cursor: pointer;
  }
  .chip.active {
    background: var(--chip-active);
    color: var(--chip-active-text);
    border-color: var(--chip-active);
  }
  main { padding: 4px 16px 40px; max-width: 640px; margin: 0 auto; }
  .item {
    display: block;
    text-decoration: none;
    color: inherit;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 13px 14px;
    margin-bottom: 10px;
  }
  .item:active { opacity: 0.7; }
  .item .src {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    font-weight: 700;
    margin-bottom: 5px;
  }
  .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .item .src .ago { color: var(--muted); font-weight: 400; }
  .item h2 {
    font-size: 15.5px;
    font-weight: 600;
    line-height: 1.35;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .item .row { display: flex; gap: 10px; align-items: flex-start; }
  .item .row h2 { flex: 1; }
  .thumb {
    width: 74px;
    height: 74px;
    object-fit: cover;
    border-radius: 10px;
    flex-shrink: 0;
    background: var(--border);
  }
  .save {
    margin-left: auto;
    border: 0;
    background: transparent;
    color: var(--muted);
    font-size: 16px;
    padding: 2px 10px;
    cursor: pointer;
  }
  .save.on { color: #f59e0b; }
  .save.on + .share, .save + .share { margin-left: 0; }
  .cu-img {
    width: 100%;
    max-height: 200px;
    object-fit: cover;
    border-radius: 14px;
    margin-bottom: 14px;
  }
  .src-row {
    display: flex;
    gap: 10px;
    align-items: flex-start;
    padding: 11px 0;
    border-bottom: 1px solid var(--border);
  }
  .src-row .dot { margin-top: 5px; }
  .src-info { flex: 1; font-size: 14px; }
  .src-about { color: var(--muted); font-size: 12.5px; line-height: 1.45; margin-top: 2px; }
  .lang-badge {
    font-size: 10px;
    color: var(--muted);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 1px 4px;
    vertical-align: 1px;
  }
  .switch input {
    appearance: none;
    -webkit-appearance: none;
    width: 42px;
    height: 26px;
    border-radius: 999px;
    background: var(--border);
    position: relative;
    transition: background 0.15s;
    cursor: pointer;
    flex-shrink: 0;
  }
  .switch input:checked { background: var(--accent); }
  .switch input::after {
    content: '';
    position: absolute;
    top: 3px;
    left: 3px;
    width: 20px;
    height: 20px;
    border-radius: 50%;
    background: #fff;
    transition: left 0.15s;
  }
  .switch input:checked::after { left: 19px; }
  #status {
    text-align: center;
    color: var(--muted);
    font-size: 14px;
    padding: 30px 20px;
  }
  .chip.action { color: var(--accent); border-style: dashed; }
  #trends {
    display: flex;
    align-items: center;
    gap: 8px;
    overflow-x: auto;
    padding: 0 0 10px;
    scrollbar-width: none;
  }
  #trends::-webkit-scrollbar { display: none; }
  #trends:empty { display: none; }
  #trends .tlbl { color: var(--muted); font-size: 12px; flex-shrink: 0; }
  #trends .chip { font-size: 12.5px; padding: 5px 11px; }
  .trend { font-size: 11px; }
  #catchup, #stats, #sources {
    position: fixed;
    inset: 0;
    z-index: 50;
    background: var(--bg);
  }
  #catchup {
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 24px;
  }
  .cu-bar {
    position: absolute;
    top: calc(14px + env(safe-area-inset-top));
    left: 16px;
    right: 64px;
    display: flex;
    gap: 5px;
  }
  .cu-bar span { flex: 1; height: 3px; border-radius: 2px; background: var(--border); }
  .cu-bar span.on { background: var(--accent); }
  .cu-close {
    position: absolute;
    top: calc(26px + env(safe-area-inset-top));
    right: 16px;
    border: 1px solid var(--border);
    background: var(--card);
    color: var(--text);
    border-radius: 50%;
    width: 34px;
    height: 34px;
    font-size: 14px;
    cursor: pointer;
  }
  .cu-cat { color: var(--accent); font-weight: 800; font-size: 13px; text-transform: uppercase; letter-spacing: 1px; }
  #catchup h2 { font-size: 25px; line-height: 1.28; margin: 10px 0 14px; }
  .cu-desc { color: var(--muted); font-size: 15px; line-height: 1.5; margin-bottom: 16px; }
  .cu-src { display: flex; align-items: center; gap: 6px; font-size: 13px; font-weight: 700; margin-bottom: 20px; }
  .cu-open {
    display: inline-block;
    background: var(--chip-active);
    color: var(--chip-active-text);
    text-decoration: none;
    font-weight: 700;
    padding: 11px 20px;
    border-radius: 999px;
  }
  .cu-hint {
    position: absolute;
    bottom: calc(18px + env(safe-area-inset-bottom));
    left: 0;
    right: 0;
    text-align: center;
    color: var(--muted);
    font-size: 12px;
  }
  .cu-done { font-size: 52px; margin-bottom: 6px; }
  .cu-close.big { position: static; width: auto; height: auto; border-radius: 999px; padding: 10px 26px; margin-top: 14px; font-size: 15px; }
  #stats, #sources { overflow-y: auto; padding: calc(20px + env(safe-area-inset-top)) 20px 40px; }
  #stats h1, #sources h1 { margin-bottom: 2px; }
  #stats h2, #sources h2 { font-size: 17px; margin: 22px 0 10px; }
  #stats .sub, #sources .sub { color: var(--muted); font-size: 13px; }
  .stat-row { display: flex; align-items: center; gap: 8px; font-size: 13.5px; margin: 7px 0; }
  .stat-row .lbl { width: 96px; flex-shrink: 0; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .stat-row .bar { flex: 1; height: 9px; background: var(--card); border: 1px solid var(--border); border-radius: 5px; overflow: hidden; }
  .stat-row .bar span { display: block; height: 100%; background: var(--accent); }
  .stat-row .n { width: 34px; text-align: right; color: var(--muted); }
  .balance { display: flex; align-items: center; gap: 16px; margin: 6px 0 4px; }
  .bal-num { font-size: 44px; font-weight: 800; line-height: 1; width: 66px; text-align: center; flex-shrink: 0; }
  .bal-meta { flex: 1; min-width: 0; }
  .bal-label { font-weight: 700; font-size: 15px; margin-bottom: 6px; }
  .bal-bar { height: 8px; background: var(--card); border: 1px solid var(--border); border-radius: 5px; overflow: hidden; margin-bottom: 6px; }
  .bal-bar span { display: block; height: 100%; }
  .wk-chips { display: flex; flex-wrap: wrap; gap: 8px; }
  .item { -webkit-user-select: none; user-select: none; }
  .item a { -webkit-touch-callout: none; }
  #sheetwrap {
    position: fixed;
    inset: 0;
    z-index: 60;
    background: rgba(0, 0, 0, 0.35);
  }
  #sheet {
    position: fixed;
    left: 0;
    right: 0;
    bottom: 0;
    z-index: 61;
    background: var(--card);
    border-top: 1px solid var(--border);
    border-radius: 18px 18px 0 0;
    padding: 16px 16px calc(16px + env(safe-area-inset-bottom));
    box-shadow: 0 -8px 30px rgba(0,0,0,0.25);
  }
  #sheet h3 { font-size: 13px; margin-bottom: 10px; color: var(--muted); font-weight: 600; }
  #sheet .wk-chips { margin-bottom: 6px; }
  #sheet .row-btn {
    display: block;
    width: 100%;
    text-align: left;
    background: transparent;
    border: 0;
    border-top: 1px solid var(--border);
    color: var(--text);
    font-size: 15px;
    padding: 13px 4px;
    margin-top: 6px;
    cursor: pointer;
  }
  #seed {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px;
    margin-bottom: 12px;
  }
  #seed h3 { font-size: 15px; margin-bottom: 4px; }
  #seed p { font-size: 12.5px; color: var(--muted); margin-bottom: 12px; }
  #seed .wk-chips { margin-bottom: 14px; }
  #seed .chip.sel { background: var(--chip-active); color: var(--chip-active-text); border-color: var(--chip-active); }
  #seed .actions { display: flex; gap: 10px; }
</style>
</head>
<body>
<header>
  <div class="topbar">
    <div>
      <h1>Briefing</h1>
      <div class="meta-line" id="updated"></div>
    </div>
    <div class="controls">
      <div class="sort" id="sort">
        <button data-mode="top" class="active">For you</button>
        <button data-mode="new">New</button>
      </div>
      <button id="bell" title="Daily digest notification" aria-label="Daily digest notification" hidden>&#128276;</button>
      <button id="searchBtn" title="Search" aria-label="Search">&#8981;</button>
      <button id="refresh" title="Refresh" aria-label="Refresh">&#8635;</button>
    </div>
  </div>
  <nav id="tabs"></nav>
  <input id="search" type="search" placeholder="Search headlines…" autocomplete="off">
  <div id="trends"></div>
</header>
<main>
  <div id="list"></div>
  <div id="status">Loading headlines…</div>
</main>

// Classify by CONTENT, not by source: a story appears only in the topics its section URL or
// title keywords actually match. If nothing matches, it falls back to the source's home section
// (a safe default so it's never lost). Brasil stays geography-based (Brazilian news sources).
function classify(item) {
  const topics = new Set();
  const url = item.link.toLowerCase();
  for (const t in TOPIC_URL) if (TOPIC_URL[t].test(url)) topics.add(t);
  for (const t in TOPIC_TOKENS) if (item.tk.some(tok => TOPIC_TOKENS[t].has(tok))) topics.add(t);
  if (topics.has('tennis')) topics.delete('sports'); // tennis has its own tab; keep Sports for other sports
  if (PT_SOURCES.has(item.src) && item.cat !== 'sports' && item.cat !== 'tennis') topics.add('brasil');
  if (topics.size === 0) topics.add(item.cat); // couldn't classify → source's home section
  return topics;
}

// Cluster stories covered by multiple outlets (>=3 shared title keywords) and score every item.
function rank() {
  // Normalize a source to its parent newsroom so one outlet's sub-feeds don't count as several
  // (e.g. Guardian + Guardian Sport + Guardian Tennis = one "Guardian" for the multi-outlet signal).
  const brand = s => {
    if (s.startsWith('G1')) return 'G1';
    if (s.startsWith('BBC')) return 'BBC';
    if (s === 'The Guardian' || s.startsWith('Guardian')) return 'Guardian';
    if (s === 'ge' || s.startsWith('ge ')) return 'ge';
    if (s === 'TC Startups' || s === 'TechCrunch') return 'TechCrunch';
    return s;
  };
  items.forEach(i => { i.tk = tokens(i.title); i.brand = brand(i.src); i.topics = classify(i); });

  const parent = items.map((_, i) => i);
  const find = x => parent[x] === x ? x : (parent[x] = find(parent[x]));

  const tokenMap = new Map();
  items.forEach((it, i) => it.tk.forEach(t => {
    if (!tokenMap.has(t)) tokenMap.set(t, []);
    tokenMap.get(t).push(i);
  }));
  const pairs = new Map();
  for (const arr of tokenMap.values()) {
    if (arr.length < 2 || arr.length > 10) continue; // ignore tokens shared by many stories (topic-level, e.g. "wimbledon") — they merge distinct stories
    for (let a = 0; a < arr.length; a++)
      for (let b = a + 1; b < arr.length; b++) {
        const k = arr[a] * 100000 + arr[b];
        pairs.set(k, (pairs.get(k) || 0) + 1);
      }
  }
  pairs.forEach((n, k) => { if (n >= 3) parent[find(Math.floor(k / 100000))] = find(k % 100000); });

  const clusterBrands = new Map();
  items.forEach((it, i) => {
    const r = find(i);
    if (!clusterBrands.has(r)) clusterBrands.set(r, new Set());
    clusterBrands.get(r).add(it.brand);
  });
  items.forEach((it, i) => { it.srcN = clusterBrands.get(find(i)).size; it.cid = find(i); });

  items.forEach(it => {
    const hours = Math.max(0, (Date.now() - it.ts) / 3600e3);
    let s = Math.exp(-hours / 9);                          // freshness: ~6h half-life
    s *= 1 + 0.6 * Math.min(3, it.srcN - 1);               // importance: multi-outlet coverage
    s *= 1 + 0.15 * (1 - Math.min(it.pos ?? 0, 15) / 15);  // importance: position in the feed
    if (/breaking|urgente|ao vivo|exclusiv/i.test(it.title)) s *= 1.25;
    let interest = 0;
    it.tk.forEach(t => { if (taste[t]) interest += Math.max(-4, Math.min(taste[t], 4)); });
    s *= 1 + Math.max(-0.35, Math.min(0.5, interest * 0.04)); // taste: reads boost, "less like this" demotes
    it.score = s;
  });
}

function timeAgo(ts) {
  const s = Math.max(0, (Date.now() - ts) / 1000);
  if (s < 60) return 'now';
  if (s < 3600) return Math.floor(s / 60) + 'm';
  if (s < 86400) return Math.floor(s / 3600) + 'h';
  return Math.floor(s / 86400) + 'd';
}

async function fetchFeed(feed) {
  for (const proxy of PROXIES) {
    try {
      const res = await fetch(proxy(feed.url), AbortSignal.timeout ? { signal: AbortSignal.timeout(15000) } : {});
      if (!res.ok) continue;
      const text = await res.text();
      const doc = new DOMParser().parseFromString(text, 'text/xml');
      if (doc.querySelector('parsererror')) continue;
      // RSS <item> or Atom <entry>. Filter first, then cap — so junk-heavy feeds keep their good items.
      const parsed = [...doc.querySelectorAll('item, entry')].map((n, pos) => {
        const title = n.querySelector('title')?.textContent?.trim();
        let link = n.querySelector('link')?.getAttribute('href') // Atom
                || n.querySelector('link')?.textContent?.trim();  // RSS
        const dateStr = n.querySelector('pubDate, published, updated')?.textContent;
        const ts = dateStr ? Date.parse(dateStr) : Date.now();
        if (feed.skip && link && feed.skip.test(link)) return null;
        if (feed.skipTitle && title && feed.skipTitle.test(title)) return null;
        if (feed.skipCat) {
          const cats = [...n.querySelectorAll('category')].map(c => c.textContent).join(' | ');
          if (feed.skipCat.test(cats) || feed.skipCat.test(title || '')) return null;
        }
        const rawDesc = n.querySelector('description, summary')?.textContent || '';
        let img = n.getElementsByTagName('media:content')[0]?.getAttribute('url')
               || n.getElementsByTagName('media:thumbnail')[0]?.getAttribute('url')
               || n.querySelector('enclosure[type^="image"]')?.getAttribute('url') || '';
        if (!img) { const m = rawDesc.match(/<img[^>]+src=["']([^"']+)/i); if (m) img = m[1]; }
        if (!/^https:/.test(img)) img = ''; // https-only to avoid mixed content
        let desc = rawDesc.replace(/<[^>]+>/g, ' ')
          .replace(/&(#8217|#x27|#39|rsquo|apos);/g, '’')
          .replace(/&(#8220|#8221|ldquo|rdquo|quot);/g, '"')
          .replace(/&(#8211|#8212|ndash|mdash);/g, '–')
          .replace(/&amp;/g, '&')
          .replace(/&#?\w+;/g, ' ')
          .replace(/\s+/g, ' ').trim().slice(0, 280);
        if (/^(article url|comments url|points)/i.test(desc) || desc === title) desc = ''; // drop boilerplate (e.g. Hacker News)
        return title && link ? { title, link, desc, img, ts: isNaN(ts) ? Date.now() : ts, src: feed.name, cat: feed.cat, color: feed.color, pos } : null;
      }).filter(Boolean).slice(0, MAX_PER_FEED);
      return { ok: true, items: parsed }; // fetch+parse worked, even if filters left 0 items
    } catch (e) { /* try next proxy */ }
  }
  return { ok: false, items: [] }; // every proxy failed
}

// What belongs in the current view: ⭐ Top = multi-outlet stories, 🕐 Recent = last 3 hours.
function catFilter(i) {
  if (activeCat === 'all') return true;
  if (activeCat === 'top') return i.srcN > 1;
  if (activeCat === 'recent') return Date.now() - i.ts <= 3 * 3600e3;
  if (activeCat === 'saved') return !!savedStore[i.link];
  return i.topics ? i.topics.has(activeCat) : i.cat === activeCat;
}

function render() {
  const q = ($search.value || '').trim().toLowerCase();
  const qMatch = i => !q || (i.title + ' ' + (i.desc || '') + ' ' + i.src).toLowerCase().includes(q);
  const visible = activeCat === 'saved'
    ? Object.values(savedStore).filter(qMatch)
    : items.filter(i => catFilter(i) && !isMuted(i) && qMatch(i));

  // Quiet news cycle: pad the ⭐ Top front page with the best-ranked single-outlet stories.
  if (activeCat === 'top' && !q && visible.length < 12) {
    const have = new Set(visible.map(i => i.link));
    visible.push(...items
      .filter(i => !isMuted(i) && !have.has(i.link))
      .sort((a, b) => b.score - a.score)
      .slice(0, 12 - visible.length));
  }

  // One card per story: group clustered items, lead with the best, link the other outlets.
  const groups = new Map();
  visible.forEach(i => {
    const k = i.cid != null ? 'c' + i.cid : i.link;
    if (!groups.has(k)) groups.set(k, []);
    groups.get(k).push(i);
  });
  // ⭐ Top is importance-ordered, 🕐 Recent newest-first, 🔖 Saved by save time.
  const chrono = activeCat === 'recent' || (sortMode === 'new' && !['top', 'saved'].includes(activeCat));
  const byMode = activeCat === 'saved'
    ? (a, b) => (b.savedAt || 0) - (a.savedAt || 0)
    : chrono ? (a, b) => b.ts - a.ts : (a, b) => (b.score || 0) - (a.score || 0);
  const cards = [...groups.values()].map(g => {
    g.sort(byMode);
    const main = g[0];
    const brands = new Set([main.brand]);
    const alts = g.slice(1).filter(x => x.link !== main.link && !brands.has(x.brand) && brands.add(x.brand)).slice(0, 3);
    return { main, alts };
  }).sort((a, b) => byMode(a.main, b.main));

  const esc = s => s.replace(/&/g, '&amp;').replace(/</g, '&lt;');
  const attr = s => s.replace(/"/g, '&quot;');
  let html = '';
  let divided = false;
  cards.forEach(c => {
    const i = c.main;
    if (chrono && !q && !divided && lastVisit && i.ts <= lastVisit && html) {
      html += '<div class="divider">you’re caught up — older news below</div>';
      divided = true;
    }
    html += `
    <div class="item${read.has(i.link) ? ' read' : ''}">
      <a class="mainlink" href="${attr(i.link)}" target="_blank" rel="noopener">
        <div class="src"><span class="dot" style="background:${i.color}"></span>${i.src} <span class="ago">· ${timeAgo(i.ts)}</span>${i.srcN > 1 ? ` <button class="hot" data-cov="${i.cid}">🔥 ${i.srcN} outlets</button>` : ''}${trendingTokens.size && i.tk && i.tk.some(t => trendingTokens.has(t)) ? ' <span class="trend">📈</span>' : ''}<button class="save${savedStore[i.link] ? ' on' : ''}" aria-label="Save for later">${savedStore[i.link] ? '★' : '☆'}</button><button class="share" aria-label="Share">⤴</button>${i.desc ? '<button class="expand" aria-label="Show summary">⌄</button>' : ''}</div>
        <div class="row">
          <h2>${esc(i.title)}</h2>
          ${i.img ? `<img class="thumb" src="${attr(i.img)}" alt="" loading="lazy" onerror="this.remove()">` : ''}
        </div>
      </a>
      ${i.desc ? `<div class="desc">${esc(i.desc)}</div>` : ''}
      ${c.alts.length ? `<div class="alts">also on ${c.alts.map(x => `<a href="${attr(x.link)}" target="_blank" rel="noopener">${x.src}</a>`).join(' · ')}</div>` : ''}
    </div>`;
  });
  $list.innerHTML = html;
  $status.textContent = cards.length ? '' : (activeCat === 'saved' ? 'Nothing saved yet — tap ☆ on any story.' : 'No headlines here yet.');
}

function toggleSave(link) {

// 🔥 tap: every outlet's take on the same story, side by side.
function openCoverage(cid) {
  if (document.getElementById('sheetwrap')) return;
  // One row per outlet (its latest take) so we compare across outlets, not within one.
  const seenBrand = new Set();
  const group = items.filter(x => x.cid === cid).sort((a, b) => b.ts - a.ts)
    .filter(x => !seenBrand.has(x.brand) && seenBrand.add(x.brand));
  if (group.length < 2) return;
  const esc = s => s.replace(/&/g, '&amp;').replace(/</g, '&lt;');
  const wrap = document.createElement('div');
  wrap.id = 'sheetwrap';
  const sheet = document.createElement('div');
  sheet.id = 'sheet';
  sheet.className = 'coverage';
  // Ownership spread: how many of the covering outlets are public / nonprofit / independent / corporate.
  const KIND_ORDER = { public: 0, nonprofit: 1, independent: 2, corporate: 3, other: 4 };
  const kinds = {};
  const byBrand = {};
  group.forEach(x => { if (!byBrand[x.brand]) { byBrand[x.brand] = 1; const k = SRC_KIND[x.src] || 'other'; kinds[k] = (kinds[k] || 0) + 1; } });
  const spread = Object.entries(kinds).sort((a, b) => KIND_ORDER[a[0]] - KIND_ORDER[b[0]])
    .map(([k, n]) => `${n} ${k}`).join(' · ');
  const sorted = [...group].sort((a, b) =>
    (KIND_ORDER[SRC_KIND[a.src]] ?? 4) - (KIND_ORDER[SRC_KIND[b.src]] ?? 4) || b.ts - a.ts);
  sheet.innerHTML = `<h3>🔥 Same story, ${Object.keys(byBrand).length} outlets — compare the takes</h3>
    <div class="cov-spread">⚖️ Ownership spread: ${spread}</div>` +
    sorted.map(x => `
      <a class="cov-row" href="${x.link.replace(/"/g, '&quot;')}" target="_blank" rel="noopener">
        <div class="src"><span class="dot" style="background:${x.color}"></span>${x.src}
          <span class="lang-badge">${SRC_KIND[x.src] || ''}</span> <span class="ago">· ${timeAgo(x.ts)}</span></div>
        <h4>${esc(x.title)}</h4>
      </a>`).join('');
  sheet.addEventListener('click', e => {
    const a = e.target.closest('a.cov-row');
    if (a) recordRead(a.getAttribute('href'));
  });
  wrap.addEventListener('click', e => { if (e.target === wrap) closeOverlay(); });
  wrap.appendChild(sheet);
  document.body.appendChild(wrap);
  openOverlay(() => wrap.remove());
}

let readlog = [];
try { readlog = JSON.parse(localStorage.getItem('briefing-readlog')) || []; } catch (e) {}

function recordRead(link) {
  read.add(link);
  if (read.size > 600) read = new Set([...read].slice(-400));
  const it = items.find(x => x.link === link);
  if (it) {
    tokens(it.title).forEach(t => { taste[t] = (taste[t] || 0) + 1; });
    const keys = Object.keys(taste);
    if (keys.length > 200) {
      keys.sort((x, y) => taste[y] - taste[x]).slice(150).forEach(k => delete taste[k]);
    }
    readlog.push({ s: it.src, c: it.cat, t: Date.now() });
    if (readlog.length > 500) readlog = readlog.slice(-400);
  }
  try {
    localStorage.setItem('briefing-read', JSON.stringify([...read]));
    localStorage.setItem('briefing-taste', JSON.stringify(taste));
    localStorage.setItem('briefing-readlog', JSON.stringify(readlog));
  } catch (err) {}
}

// ---- 7-day archive (IndexedDB) + trending detection ----
function idb() {
  return new Promise((res, rej) => {
    const r = indexedDB.open('briefing', 1);
    r.onupgradeneeded = () => r.result.createObjectStore('archive', { keyPath: 'link' });
    r.onsuccess = () => res(r.result);
    r.onerror = () => rej(r.error);
  });
}

async function archivePut(list) {
  try {
    const db = await idb();
    const tx = db.transaction('archive', 'readwrite');
    const st = tx.objectStore('archive');
    list.forEach(i => st.put({ link: i.link, title: i.title, ts: i.ts, src: i.src, cat: i.cat, brand: i.brand || i.src }));
    const cutoff = Date.now() - 7 * 86400e3;
    st.openCursor().onsuccess = e => {
      const c = e.target.result;
      if (c) { if (c.value.ts < cutoff) c.delete(); c.continue(); }
    };
    tx.oncomplete = () => { db.close(); computeTrending(); };
  } catch (e) {}
}

async function archiveAll() {
  try {
    const db = await idb();
    return await new Promise(res => {
      const q = db.transaction('archive').objectStore('archive').getAll();
      q.onsuccess = () => { res(q.result); db.close(); };
      q.onerror = () => { res([]); db.close(); };
    });
  } catch (e) { return []; }
}

// Trending = a keyword hitting >=4 stories from >=3 outlets in 24h, and (once we have
// a baseline) at 3x its usual daily volume.
let trendingTokens = new Set();
let trendingTop = [];

async function computeTrending() {
  const arc = await archiveAll();
  if (!arc.length) return;
  const dayAgo = Date.now() - 86400e3;
  const counts = new Map();
  let oldest = Date.now();
  arc.forEach(a => {
    oldest = Math.min(oldest, a.ts);
    tokens(a.title).forEach(t => {
      let c = counts.get(t);
      if (!c) { c = { n24: 0, b: new Set(), old: 0 }; counts.set(t, c); }
      if (a.ts >= dayAgo) { c.n24++; c.b.add(a.brand); } else c.old++;
    });
  });
  const baselineDays = Math.max(0, (dayAgo - oldest) / 86400e3);
  const list = [];
  counts.forEach((c, t) => {
    if (!TREND_SKIP.has(t) && !muted.has(t) && c.n24 >= 4 && c.b.size >= 3 && (baselineDays < 1 || c.n24 > 3 * (c.old / baselineDays))) list.push([t, c.n24]);
  });
  list.sort((a, b) => b[1] - a[1]);
  trendingTop = list.slice(0, 6);
  trendingTokens = new Set(trendingTop.map(x => x[0]));
  renderTrends();
  render();
}

function renderTrends() {
  const el = document.getElementById('trends');
  el.innerHTML = trendingTop.length
    ? '<span class="tlbl">📈 Trending</span>' + trendingTop.map(([t, n]) =>
        `<button class="chip" data-term="${t}">${t} · ${n}</button>`).join('')
    : '';
}

// Overlays join the history stack so the Android back gesture closes them instead of exiting the app.
let overlayClose = null;

});
function openOverlay(closeFn) {

// ---- Swipe gestures: horizontal = switch tab, pull down at top = refresh ----
let swipeX = 0, swipeY = 0, swipeAtTop = false;
document.addEventListener('touchstart', e => {
  const t = e.touches[0];
  swipeX = t.clientX; swipeY = t.clientY;
  swipeAtTop = window.scrollY <= 0;
  lpFired = false;
}, { passive: true });

document.addEventListener('touchend', e => {
  if (cardDragEngaged) { cardDragEngaged = false; return; }
  if (document.getElementById('catchup') || document.getElementById('stats') || document.getElementById('sheetwrap')) return;
  const t = e.changedTouches[0];
  const dx = t.clientX - swipeX, dy = t.clientY - swipeY;
  if (Math.abs(dx) > 70 && Math.abs(dx) > 2 * Math.abs(dy)) switchTab(dx < 0 ? 1 : -1);
  else if (swipeAtTop && dy > 90 && Math.abs(dx) < 60 && window.scrollY <= 0 && !$refresh.classList.contains('spinning')) refresh();
}, { passive: true });

function switchTab(dir) {
  const idx = CATS.findIndex(c => c.id === activeCat);
  const next = CATS[idx + dir];
  if (!next) return;
  activeCat = next.id;
  document.querySelectorAll('#tabs .chip').forEach(el => el.classList.toggle('active', el.dataset.cat === next.id));
  document.querySelector(`#tabs .chip[data-cat="${next.id}"]`)?.scrollIntoView({ inline: 'center', block: 'nearest', behavior: 'smooth' });
  history.replaceState(null, '', '#' + activeCat);
  window.scrollTo(0, 0);
  render();
}

// ---- Catch-up mode: the top story per category, one full-screen slide at a time ----
function openCatchup() {
  const slides = [];
  CATS.filter(c => !['all', 'top', 'recent', 'saved'].includes(c.id)).forEach(c => {
    const pool = items.filter(i => (i.topics ? i.topics.has(c.id) : i.cat === c.id) && !isMuted(i)).sort((a, b) => b.score - a.score);
    const pick = pool.find(i => !read.has(i.link)) || pool[0];
    if (pick) slides.push(pick);
  });
  if (!slides.length) return;
  let idx = 0;
  const ov = document.createElement('div');
  ov.id = 'catchup';
  document.body.appendChild(ov);
  const esc = s => s.replace(/&/g, '&amp;').replace(/</g, '&lt;');
  const catName = id => CATS.find(c => c.id === id)?.label || id;
  function show() {
    if (idx >= slides.length) {
      ov.innerHTML = `<div style="text-align:center"><div class="cu-done">✓</div><h2>You’re caught up</h2>
        <p class="cu-desc">The ${slides.length} top stories, done.</p><button class="cu-close big">Close</button></div>`;
      return;
    }
    const s = slides[idx];
    ov.innerHTML = `
      <div class="cu-bar">${slides.map((_, n) => `<span class="${n <= idx ? 'on' : ''}"></span>`).join('')}</div>
      <button class="cu-close" aria-label="Close">✕</button>
      <div>
        ${s.img ? `<img class="cu-img" src="${s.img.replace(/"/g, '&quot;')}" alt="" loading="lazy" onerror="this.remove()">` : ''}
        <div class="cu-cat">${catName(s.cat)}</div>
        <h2>${esc(s.title)}</h2>
        ${s.desc ? `<p class="cu-desc">${esc(s.desc)}</p>` : ''}
        <div class="cu-src"><span class="dot" style="background:${s.color}"></span>${s.src} · ${timeAgo(s.ts)}</div>
        <a class="cu-open" href="${s.link.replace(/"/g, '&quot;')}" target="_blank" rel="noopener">Read article ↗</a>
      </div>
      <div class="cu-hint">tap right side for next · left for back</div>`;
  }
  ov.addEventListener('click', e => {
    if (e.target.closest('.cu-close')) { closeOverlay(); return; }
    const open = e.target.closest('.cu-open');
    if (open) { recordRead(open.getAttribute('href')); return; }
    if (e.clientX / innerWidth < 0.35) { if (idx > 0) { idx--; show(); } }
    else { idx++; show(); }
  });
  let sx = 0;
  ov.addEventListener('touchstart', e => { sx = e.touches[0].clientX; }, { passive: true });
  ov.addEventListener('touchend', e => {
    const dx = e.changedTouches[0].clientX - sx;
    if (dx < -60) { idx++; show(); }
    else if (dx > 60 && idx > 0) { idx--; show(); }
  }, { passive: true });
  openOverlay(() => { ov.remove(); render(); });
  show();
}

// ---- Mute list + "less like this" (long-press or right-click a card) ----
let muted = new Set();
try { muted = new Set(JSON.parse(localStorage.getItem('briefing-muted')) || []); } catch (e) {}
const saveMuted = () => { try { localStorage.setItem('briefing-muted', JSON.stringify([...muted])); } catch (e) {} };
const isMuted = i => i.tk && i.tk.some(t => muted.has(t));

function openSheet(card) {
  if (document.getElementById('sheetwrap')) return;
  const link = card.querySelector('.mainlink')?.getAttribute('href');

  sheet.innerHTML = `
    <h3>🚫 Mute a topic — never see it again</h3>

    <button class="row-btn" data-less>👎 Less like this</button>

  sheet.addEventListener('click', e => {

    if (m) {
      muted.add(m.dataset.mute);
      saveMuted();
      closeOverlay();
      computeTrending();
      render();

    }
    if (e.target.closest('[data-less]')) {
      (it.tk || []).forEach(t => { taste[t] = (taste[t] || 0) - 2; });
      try { localStorage.setItem('briefing-taste', JSON.stringify(taste)); } catch (err) {}
      rank();
      render();
      closeOverlay();
      return;
    }
    if (e.target.closest('[data-cancel]')) closeOverlay();
  });

}

// Suppress the "ghost click" a long-press can fire on the link underneath the sheet.

let lpTimer = 0;
$list.addEventListener('touchstart', e => {
  const card = e.target.closest('.item');
  if (card) lpTimer = setTimeout(() => { lpFired = true; openSheet(card); }, 550);

// Swipe a card right to save it, left for mute/less-like-this.
let dragCard = null, dragX0 = 0, dragY0 = 0, dragging = false, cardDragEngaged = false;
$list.addEventListener('touchstart', e => {
  dragCard = e.target.closest('.item');
  dragX0 = e.touches[0].clientX;
  dragY0 = e.touches[0].clientY;
  dragging = false;
}, { passive: true });
$list.addEventListener('touchmove', e => {
  if (!dragCard) return;
  const dx = e.touches[0].clientX - dragX0, dy = e.touches[0].clientY - dragY0;
  if (!dragging && Math.abs(dx) > 25 && Math.abs(dx) > Math.abs(dy) * 1.3) {

  if (dragging) {

// ---- Listen mode: your phone reads the top headlines aloud (on-device, free) ----
let speaking = false;
function toggleListen(btn) {
  if (speaking) {
    speaking = false;
    speechSynthesis.cancel();
    btn.textContent = '▶ Listen';
    return;
  }
  if (!('speechSynthesis' in window)) return;
  const pool = items
    .filter(i => catFilter(i) && !isMuted(i))
    .sort((a, b) => b.score - a.score)
    .slice(0, 10);
  if (!pool.length) return;
  speaking = true;
  pool.forEach((s, n) => {
    const u = new SpeechSynthesisUtterance(`${s.src}. ${s.title}`);
    u.lang = PT_SOURCES.has(s.src) ? 'pt-BR' : 'en-US';
    u.rate = 1.05;
    u.onstart = () => { if (speaking) btn.textContent = `■ Stop · ${n + 1}/${pool.length}`; };
    if (n === pool.length - 1) u.onend = () => { speaking = false; btn.textContent = '▶ Listen'; };
    speechSynthesis.speak(u);
  });
}

  'São Paulo': ['paulo', 'paulista', 'prefeitura', 'metro', 'capital'],
  'Geopolítica': ['china', 'russia', 'ucrania', 'ukraine', 'israel', 'gaza', 'guerra', 'nato', 'otan'],
  'Energia & Clima': ['energia', 'petroleo', 'solar', 'eolica', 'clima', 'climate', 'petrobras', 'carbono'],
  'Crypto': ['bitcoin', 'ethereum', 'crypto', 'cripto', 'blockchain'],
};

if (!localStorage.getItem('briefing-seeded')) {
  const seed = document.createElement('div');
  seed.id = 'seed';
  seed.innerHTML = `
    <h3>What are you into?</h3>
    <p>Pick a few topics to tune your Top feed from day one. It keeps learning from what you read.</p>
    <div class="wk-chips">${Object.keys(SEED_TOPICS).map(t => `<button class="chip" data-topic="${t}">${t}</button>`).join('')}</div>
    <div class="actions"><button class="chip action" data-done>Done</button><button class="chip" data-skip>Skip</button></div>`;
  seed.addEventListener('click', e => {
    const t = e.target.closest('[data-topic]');
    if (t) { t.classList.toggle('sel'); return; }
    if (e.target.closest('[data-done]')) {
      seed.querySelectorAll('.sel').forEach(el => SEED_TOPICS[el.dataset.topic].forEach(tok => { taste[tok] = (taste[tok] || 0) + 3; }));
      try { localStorage.setItem('briefing-taste', JSON.stringify(taste)); } catch (err) {}
      rank();
      render();
    }
    if (e.target.closest('[data-done], [data-skip]')) {
      localStorage.setItem('briefing-seeded', '1');
      seed.remove();
    }
  });
  $list.parentNode.insertBefore(seed, $list);
}

// ---- Media-diet stats: what you actually read, all on-device ----
const PT_SOURCES = new Set(FEEDS.filter(f => f.lang === 'pt').map(f => f.name));

function openStats() {
  archiveAll().then(arc => {
    const week = Date.now() - 7 * 86400e3;
    const logs = readlog.filter(r => r.t >= week);
    const byCat = {}, bySrc = {}, kindCount = {};
    const KIND_LABEL = { corporate: 'Corporate', independent: 'Independent', nonprofit: 'Nonprofit / trust', public: 'Public / state' };
    let pt = 0;
    logs.forEach(r => {
      byCat[r.c] = (byCat[r.c] || 0) + 1;
      bySrc[r.s] = (bySrc[r.s] || 0) + 1;
      if (PT_SOURCES.has(r.s)) pt++;
      const k = KIND_LABEL[SRC_KIND[r.s]] || 'Corporate';
      kindCount[k] = (kindCount[k] || 0) + 1;
    });
    const corpShare = logs.length ? (kindCount['Corporate'] || 0) / logs.length : 0;
    const bars = (obj, name) => {
      const entries = Object.entries(obj).sort((a, b) => b[1] - a[1]).slice(0, 8);
      const max = entries[0]?.[1] || 1;
      return entries.map(([k, n]) => `<div class="stat-row"><span class="lbl">${name ? name(k) : k}</span>
        <span class="bar"><span style="width:${Math.round(100 * n / max)}%"></span></span><span class="n">${n}</span></div>`).join('');
    };
    const wk = new Map();
    arc.forEach(a => tokens(a.title).forEach(t => {
      let c = wk.get(t);
      if (!c) { c = { n: 0, b: new Set() }; wk.set(t, c); }
      c.n++; c.b.add(a.brand);
    }));
    const topWeek = [...wk].filter(([t, c]) => c.b.size >= 3 && !TREND_SKIP.has(t)).sort((a, b) => b[1].n - a[1].n).slice(0, 10);
    const catName = id => CATS.find(c => c.id === id)?.label || id;
    const ptPct = logs.length ? Math.round(100 * pt / logs.length) : 0;

    // Balance score: how spread your reading is across ownership types (normalized entropy over
    // the 4 kinds) and across distinct sources. 100 = you sample widely; low = a narrow diet.
    const KINDS = ['corporate', 'independent', 'nonprofit', 'public'];
    const rawKind = {};
    logs.forEach(r => { const k = SRC_KIND[r.s] || 'corporate'; rawKind[k] = (rawKind[k] || 0) + 1; });
    const kc = KINDS.map(k => rawKind[k] || 0);
    const totK = kc.reduce((a, b) => a + b, 0);
    let H = 0;
    kc.forEach(c => { if (c > 0) { const p = c / totK; H -= p * Math.log2(p); } });
    const diversity = totK ? H / 2 : 0; // log2(4) = 2
    const breadth = Math.min(1, Object.keys(bySrc).length / 8);
    const balance = Math.round(100 * (0.65 * diversity + 0.35 * breadth));
    const balLabel = balance >= 70 ? 'Well balanced' : balance >= 45 ? 'Fairly balanced' : balance >= 25 ? 'A bit narrow' : 'One-sided';
    const balColor = balance >= 70 ? '#22c55e' : balance >= 45 ? '#84cc16' : balance >= 25 ? '#f59e0b' : '#ef4444';

    const ov = document.createElement('div');
    ov.id = 'stats';
    ov.innerHTML = `
      <button class="cu-close" aria-label="Close">✕</button>
      <h1>Your media diet</h1>
      <div class="sub">Last 7 days · lives only on this device</div>
      ${logs.length ? `
        <h2>${logs.length} stories read</h2>
        <div class="balance">
          <div class="bal-num" style="color:${balColor}">${balance}</div>
          <div class="bal-meta">
            <div class="bal-label">${balLabel} media diet</div>
            <div class="bal-bar"><span style="width:${balance}%;background:${balColor}"></span></div>
            <div class="sub">Spread across ownership types &amp; sources${logs.length < 8 ? ' — read a few more to sharpen this' : ''}.</div>
          </div>
        </div>
        <h2>By topic</h2>${bars(byCat, catName)}
        <h2>By source</h2>${bars(bySrc)}
        <h2>Language</h2>
        <div class="stat-row"><span class="lbl">Português</span><span class="bar"><span style="width:${ptPct}%"></span></span><span class="n">${ptPct}%</span></div>
        <div class="stat-row"><span class="lbl">English</span><span class="bar"><span style="width:${100 - ptPct}%"></span></span><span class="n">${100 - ptPct}%</span></div>
        <h2>Ownership balance</h2>${bars(kindCount)}
        ${corpShare > 0.7 && logs.length >= 10 ? '<div class="sub">Heavy on corporate media this week — try enabling Intercept Brasil, Agência Pública or more nonprofits in ⚙ Sources.</div>' : ''}`
      : '<h2>No reads logged yet</h2><div class="sub">Stats build up as you tap stories — check back in a few days.</div>'}
      ${topWeek.length ? `<h2>The week’s big topics</h2><div class="wk-chips">${topWeek.map(([t, c]) =>
        `<span class="chip">${t} · ${c.n}</span>`).join('')}</div>` : ''}
      ${muted.size ? `<h2>Muted topics — tap to unmute</h2><div class="wk-chips">${[...muted].map(t =>
        `<button class="chip" data-unmute="${t}">🚫 ${t} ✕</button>`).join('')}</div>` : ''}
      ${feedHealth.length ? `<h2>Source health</h2><div class="sub">${feedHealth.filter(h => h.ok).length}/${feedHealth.length} sources reached on the last refresh${feedHealth.some(h => !h.ok) ? '.<br>⚠️ Could not reach: ' + feedHealth.filter(h => !h.ok).map(h => h.name).join(', ') : ''}${feedHealth.some(h => h.ok && !h.count) ? '.<br>Reached but no new stories: ' + feedHealth.filter(h => h.ok && !h.count).map(h => h.name).join(', ') : ''}</div>` : ''}
      <h2>Backup</h2>
      <div class="sub">Your taste profile, saved stories, mutes and history — as a file you can import on another device.</div>
      <div class="wk-chips" style="margin-top:10px"><button class="chip" data-export>⬇ Export my data</button><button class="chip" data-import>⬆ Import</button></div>
      <input type="file" accept=".json,application/json" hidden>`;
    ov.addEventListener('click', e => {
      const um = e.target.closest('[data-unmute]');
      if (um) {
        muted.delete(um.dataset.unmute);
        saveMuted();
        um.remove();
        computeTrending();
        render();
        return;
      }
      if (e.target.closest('[data-export]')) {
        const data = { taste, muted: [...muted], read: [...read], readlog, saved: savedStore, seeded: localStorage.getItem('briefing-seeded'), sort: sortMode, sources: srcOverrides };
        const a = document.createElement('a');
        a.href = URL.createObjectURL(new Blob([JSON.stringify(data)], { type: 'application/json' }));
        a.download = 'briefing-backup.json';
        a.click();
        return;
      }
      if (e.target.closest('[data-import]')) { ov.querySelector('input[type=file]').click(); return; }
      if (e.target.closest('.cu-close')) closeOverlay();
    });
    ov.querySelector('input[type=file]').addEventListener('change', ev => {
      const file = ev.target.files[0];
      if (!file) return;
      file.text().then(txt => {
        const d = JSON.parse(txt);
        if (d.taste) localStorage.setItem('briefing-taste', JSON.stringify(d.taste));
        if (d.muted) localStorage.setItem('briefing-muted', JSON.stringify(d.muted));
        if (d.read) localStorage.setItem('briefing-read', JSON.stringify(d.read));
        if (d.readlog) localStorage.setItem('briefing-readlog', JSON.stringify(d.readlog));
        if (d.saved) localStorage.setItem('briefing-saved', JSON.stringify(d.saved));
        if (d.seeded) localStorage.setItem('briefing-seeded', d.seeded);
        if (d.sort) localStorage.setItem('briefing-sort', d.sort);
        if (d.sources) localStorage.setItem('briefing-sources', JSON.stringify(d.sources));
        location.reload();
      }).catch(() => {});
    });
    document.body.appendChild(ov);
    openOverlay(() => ov.remove());
  });
}

// ---- ⚙ Sources: toggle each outlet, with who-owns-it context ----
function openSources() {
  const ov = document.createElement('div');
  ov.id = 'sources';
  let dirty = false;
  const groups = CATS.filter(c => !['all', 'top', 'recent', 'saved'].includes(c.id));
  ov.innerHTML = `
    <button class="cu-close" aria-label="Close">✕</button>
    <h1>Sources</h1>
    <div class="sub">${FEEDS.length} available — toggle what goes into your feed. Notes cover ownership and independence, so you know who you're reading.</div>` +
    groups.map(c => `<h2>${c.label}</h2>` + FEEDS.filter(f => f.cat === c.id).map(f => `
      <div class="src-row">
        <span class="dot" style="background:${f.color}"></span>
        <div class="src-info"><b>${f.name}</b> <span class="lang-badge">${f.lang.toUpperCase()}</span> <span class="lang-badge">${SRC_KIND[f.name] || ''}</span>
          <div class="src-about">${f.about}</div>
        </div>
        <label class="switch"><input type="checkbox" data-src="${f.name}"${srcEnabled(f.name) ? ' checked' : ''}></label>
      </div>`).join('')).join('');
  ov.addEventListener('change', e => {
    const t = e.target.closest('[data-src]');
    if (!t) return;
    srcOverrides[t.dataset.src] = t.checked;
    try { localStorage.setItem('briefing-sources', JSON.stringify(srcOverrides)); } catch (err) {}
    dirty = true;
  });
  ov.addEventListener('click', e => { if (e.target.closest('.cu-close')) closeOverlay(); });
  document.body.appendChild(ov);
  openOverlay(() => {
    ov.remove();
    if (dirty) {
      items = items.filter(i => srcEnabled(i.src));
      rank();
      render();
      refresh();
    }
  });
}

function setItems(newItems, fetchedAt) {
  const seen = new Set();
  items = newItems
    .filter(i => i.ts <= Date.now() + 3600e3 && srcEnabled(i.src))
    .sort((a, b) => b.ts - a.ts)
    .filter(i => !seen.has(i.link) && seen.add(i.link));
  rank();
  lastFetch = fetchedAt;
  $updated.textContent = 'Updated ' + new Date(fetchedAt).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  render();
  if (catchupOnBoot && items.length) { catchupOnBoot = false; openCatchup(); }
}

let feedHealth = [];

async function refresh() {
  $refresh.classList.add('spinning');
  try {
    const active = FEEDS.filter(f => srcEnabled(f.name));
    const results = await Promise.allSettled(active.map(fetchFeed));
    feedHealth = active.map((f, i) => {
      const v = results[i].status === 'fulfilled' ? results[i].value : { ok: false, items: [] };
      return { name: f.name, ok: v.ok, count: v.items.length };
    });
    const all = results.flatMap(r => r.status === 'fulfilled' ? r.value.items : []);
    if (all.length) {
      const fetchedAt = Date.now();
      setItems(all, fetchedAt);
      try { localStorage.setItem(CACHE_KEY, JSON.stringify({ fetchedAt, items })); } catch (e) {}
      archivePut(items);
    } else if (!items.length) {
      $status.textContent = 'Could not load feeds. Check your connection and tap ↻.';
    }
  } finally {
    $refresh.classList.remove('spinning');
  }
}

$refresh.onclick = refresh;

document.getElementById('searchBtn').onclick = () => {
  const open = document.querySelector('header').classList.toggle('searching');
  if (open) $search.focus();
  else { $search.value = ''; render(); }
};
$search.addEventListener('input', render);

// Coming back to the app after 2+ minutes in the background pulls fresh headlines.
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible' && Date.now() - lastFetch > 120e3 && !$refresh.classList.contains('spinning')) refresh();
});

// Offline support: the service worker keeps the app shell available without a connection.
if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');

// Daily digest: bell subscribes this device to a 7:00 morning push (needs MY_PROXY worker).
const $bell = document.getElementById('bell');
const b64uToU8 = s => {
  s = s.replace(/-/g, '+').replace(/_/g, '/');
  return Uint8Array.from(atob(s + '='.repeat((4 - s.length % 4) % 4)), c => c.charCodeAt(0));
};
if (MY_PROXY && 'serviceWorker' in navigator && 'PushManager' in window) {
  $bell.hidden = false;
  navigator.serviceWorker.ready
    .then(reg => reg.pushManager.getSubscription())
    .then(sub => { if (sub) $bell.classList.add('on'); });
  $bell.onclick = async () => {
    try {
      const reg = await navigator.serviceWorker.ready;
      let sub = await reg.pushManager.getSubscription();
      if (sub) {
        fetch(MY_PROXY.replace(/\/$/, '') + '/unsubscribe', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ endpoint: sub.endpoint }),
        }).catch(() => {});
        await sub.unsubscribe();
        $bell.classList.remove('on');
        return;
      }
      if (await Notification.requestPermission() !== 'granted') return;
      sub = await reg.pushManager.subscribe({ userVisibleOnly: true, applicationServerKey: b64uToU8(PUSH_PUBLIC_KEY) });
      const ok = await fetch(MY_PROXY.replace(/\/$/, '') + '/subscribe', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(sub),
      }).then(r => r.ok).catch(() => false);
      if (ok) $bell.classList.add('on');
      else await sub.unsubscribe();
    } catch (e) {}
  };
}

// Show cached headlines instantly, then fetch fresh ones.
try {
  const cached = JSON.parse(localStorage.getItem(CACHE_KEY));
  if (cached?.items?.length) setItems(cached.items, cached.fetchedAt);
} catch (e) {}
computeTrending();
refresh();
</script>
